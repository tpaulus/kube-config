---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-bootstrap-config
  namespace: homepage
data:
  bookmarks.yaml: |
    []
  custom.css: ""
  custom.js: ""
  docker.yaml: ""
  kubernetes.yaml: |
    mode: cluster
  services.yaml: |
    []
  settings.yaml: |
    title: Home
    color: slate
    maxGroupColumns: 3
    layout:
      - Smart Home:
      - Media:
      - Documents:
      - Infrastructure:
      - Storage:
      - Monitoring:
      - Automation:
      - Content Acquisition:
  widgets.yaml: |
    - search:
        provider: duckduckgo
        target: _blank
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: cluster
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
        network: default

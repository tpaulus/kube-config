---
apiVersion: v1
kind: Service
metadata:
  name: grafana
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: simple-idp-secrets
spec:
  itemPath: vaults/K3S/items/simple-idp
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-brickyard-whitestar-systems
spec:
  secretName: grafana-brickyard-whitestar-systems-cert
  duration: 2160h0m0s
  dnsNames:
    - grafana.brickyard.whitestar.systems
  issuerRef:
    name: letsencrypt-cf-prod
    kind: ClusterIssuer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
spec:
  rules:
    - host: grafana.ing.k3s.brickyard.whitestar.systems
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: grafana
                port:
                  number: 3000
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: jwt-verification
spec:
  plugin:
    jwt:
      issuers: ["https://whitestar.cloudflareaccess.com/cdn-cgi/access/certs"]
      headerName: Cf-Access-Jwt-Assertion
      require:
        aud: 383cd50986ddcddc0018638011ea367e4a2dc57dd0b59635b18b9f8be0c144f7
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ext
  annotations:
    external-dns.kubernetes.io/target: lfp.it.paulus.family
spec:
  tls:
    - hosts:
        - grafana.brickyard.whitestar.systems
      secretName: grafana-brickyard-whitestar-systems-cert
  rules:
    - host: grafana.brickyard.whitestar.systems
      http:
        paths:
          - backend:
              service:
                name: grafana
                port:
                  number: 3000
            path: /
            pathType: Prefix
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-tailscale
spec:
  ingressClassName: tailscale
  tls:
    - hosts:
        - grafana
  rules:
    - http:
        paths:
          - backend:
              service:
                name: grafana
                port:
                  number: 3000
            path: /
            pathType: Prefix

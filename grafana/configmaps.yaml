---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
data:
  grafana.ini: |
    [server]
    root_url = https://grafana.brickyard.whitestar.systems/
    [users]
    allow_sign_up = false
    auto_assign_org = true
    auto_assign_org_role = Editor
    [auth]
    disable_login_form = true
    oauth_auto_login = true
    [auth.generic_oauth]
    enabled = true
    name = Simple IDP
    client_id = grafana
    client_secret = $__env{GRAFANA_OIDC_CLIENT_SECRET}
    scopes = openid profile email groups
    auth_url = https://sso.paulus.family/authorize
    token_url = https://sign-on-config.paulus.family/token
    api_url = https://sign-on-config.paulus.family/userinfo
    login_attribute_path = preferred_username
    name_attribute_path = name
    email_attribute_path = email
    auto_sign_up = true
    use_pkce = false
    skip_org_role_sync = true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provisioning
data:
  dashboards.yaml: |-
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  datasources.yaml: |-
    apiVersion: 1
    datasources:
      - name: Kube Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc:8080
        jsonData:
          manageAlerts: true
          prometheusType: Prometheus
          cacheLevel: 'Medium'
          incrementalQuerying: true
          incrementalQueryOverlapWindow: 2m
          disableRecordingRules: true
      - name: NAS Prometheus
        type: prometheus
        access: proxy
        isDefault: true
        url: http://woodlandpark.brickyard.whitestar.systems:9090
        jsonData:
          manageAlerts: false
          prometheusType: Prometheus
          cacheLevel: 'Medium'
          incrementalQuerying: true
          incrementalQueryOverlapWindow: 5m
          disableRecordingRules: true
      - name: AlertManager
        type: alertmanager
        access: proxy
        url: http://alertmanager.monitoring.svc:8080
        jsonData:
          implementation: prometheus
          handleGrafanaManagedAlerts: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.loki.svc:3100
        jsonData:
          maxLines: 1000

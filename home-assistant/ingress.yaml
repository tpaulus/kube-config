---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: home-assistant
  namespace: home-assistant
  annotations:
    external-dns.kubernetes.io/target: lfp.it.paulus.family
    internal.paulus.family/target: 10.0.10.16 # OPNSense Unbound Only Supports IP Addresses, not CNAMES
    traefik.ingress.kubernetes.io/service.serversscheme: https
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - home.paulus.family
      secretName: home-assistant-tls
  rules:
    - host: home.paulus.family
      http:
        paths:
          - backend:
              service:
                name: home-assistant
                port:
                  name: https
            path: /
            pathType: Prefix

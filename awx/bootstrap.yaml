---
apiVersion: v1
kind: ConfigMap
metadata:
  name: awx-bootstrap
  namespace: awx
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  bootstrap.py: |
    import base64
    import json
    import os
    import sys
    import time
    import urllib.error
    import urllib.parse
    import urllib.request


    API_URL = os.environ.get("AWX_API_URL", "http://awx-service/api/v2").rstrip("/")
    ADMIN_USER = os.environ["AWX_ADMIN_USER"]
    ADMIN_PASSWORD = os.environ["AWX_ADMIN_PASSWORD"]
    ORGANIZATION_NAME = os.environ.get("AWX_ORGANIZATION_NAME", "Whitestar Systems")
    PROJECT_NAME = os.environ.get("AWX_PROJECT_NAME", "tpaulus/ansible")
    PROJECT_URL = os.environ.get("AWX_PROJECT_URL", "https://github.com/tpaulus/ansible.git")
    INVENTORY_NAME = os.environ.get("AWX_INVENTORY_NAME", "NetBox")
    INVENTORY_SOURCE_NAME = os.environ.get("AWX_INVENTORY_SOURCE_NAME", "NetBox inventory")
    JOB_TEMPLATE_NAME = os.environ.get("AWX_JOB_TEMPLATE_NAME", "Provision all")
    LIMIT = os.environ.get("AWX_LIMIT", "WoodlandPark")
    NETBOX_TOKEN = os.environ["AWX_NETBOX_TOKEN"]
    VAULT_PASSWORD = os.environ["AWX_VAULT_PASSWORD"]


    def log(message):
        print(message, flush=True)


    def auth_header():
        token = base64.b64encode(f"{ADMIN_USER}:{ADMIN_PASSWORD}".encode()).decode()
        return f"Basic {token}"


    def request(method, path, payload=None, query=None):
        url = f"{API_URL}/{path.lstrip('/')}"
        if query:
            url = f"{url}?{urllib.parse.urlencode(query)}"
        data = None
        headers = {
            "Authorization": auth_header(),
            "Accept": "application/json",
        }
        if payload is not None:
            data = json.dumps(payload).encode()
            headers["Content-Type"] = "application/json"
        req = urllib.request.Request(url, data=data, method=method, headers=headers)
        try:
            with urllib.request.urlopen(req, timeout=30) as resp:
                body = resp.read().decode()
                return json.loads(body) if body else {}
        except urllib.error.HTTPError as exc:
            body = exc.read().decode()
            raise RuntimeError(f"{method} {url} failed: {exc.code} {body}") from exc


    def wait_for_awx():
        for attempt in range(120):
            try:
                request("GET", "ping/")
                log("AWX API is ready")
                return
            except Exception as exc:
                if attempt == 119:
                    raise
                log(f"Waiting for AWX API: {exc}")
                time.sleep(10)


    def list_all(path, query=None):
        merged = []
        page = 1
        while True:
            q = {"page": page, "page_size": 200}
            if query:
                q.update(query)
            data = request("GET", path, query=q)
            merged.extend(data.get("results", []))
            if not data.get("next"):
                return merged
            page += 1


    def find_one(path, matcher, query=None):
        for item in list_all(path, query=query):
            if matcher(item):
                return item
        return None


    def upsert(path, name, payload, matcher=None, query=None):
        matcher = matcher or (lambda item: item.get("name") == name)
        existing = find_one(path, matcher, query=query)
        if existing is None:
            created = request("POST", path, payload)
            log(f"Created {path.rstrip('/')} {name}")
            return created
        changed = request("PATCH", f"{path.rstrip('/')}/{existing['id']}/", payload)
        log(f"Updated {path.rstrip('/')} {name}")
        return changed


    def ensure_association(path, item_id):
        existing = list_all(path)
        if any(item.get("id") == item_id for item in existing):
            return
        request("POST", path, {"associate": True, "id": item_id})


    def get_builtin_credential_type(name, kind):
        result = find_one(
            "credential_types/",
            lambda item: item.get("name") == name or item.get("kind") == kind,
            query={"managed": "true"},
        )
        if result is None:
            raise RuntimeError(f"Unable to find built-in credential type {name}/{kind}")
        return result


    def main():
        wait_for_awx()

        org = upsert(
            "organizations/",
            ORGANIZATION_NAME,
            {
                "name": ORGANIZATION_NAME,
                "description": "Bootstrap-created organization for homelab automation.",
            },
        )

        netbox_credential_type = upsert(
            "credential_types/",
            "NetBox Token",
            {
                "name": "NetBox Token",
                "description": "Injects NETBOX_TOKEN for inventory sources and jobs.",
                "kind": "cloud",
                "inputs": {
                    "fields": [
                        {
                            "id": "netbox_token",
                            "type": "string",
                            "label": "NetBox API Token",
                            "secret": True,
                        }
                    ],
                    "required": ["netbox_token"],
                },
                "injectors": {
                    "env": {
                        "NETBOX_TOKEN": "{{ netbox_token }}"
                    }
                },
            },
        )

        vault_credential_type = get_builtin_credential_type("Vault", "vault")

        netbox_credential = upsert(
            "credentials/",
            "NetBox",
            {
                "name": "NetBox",
                "organization": org["id"],
                "credential_type": netbox_credential_type["id"],
                "inputs": {
                    "netbox_token": NETBOX_TOKEN,
                },
            },
            matcher=lambda item: item.get("name") == "NetBox" and item.get("organization") == org["id"],
        )

        vault_credential = upsert(
            "credentials/",
            "Ansible Vault",
            {
                "name": "Ansible Vault",
                "organization": org["id"],
                "credential_type": vault_credential_type["id"],
                "inputs": {
                    "vault_password": VAULT_PASSWORD,
                },
            },
            matcher=lambda item: item.get("name") == "Ansible Vault" and item.get("organization") == org["id"],
        )

        project = upsert(
            "projects/",
            PROJECT_NAME,
            {
                "name": PROJECT_NAME,
                "description": "User Ansible repository.",
                "organization": org["id"],
                "scm_type": "git",
                "scm_url": PROJECT_URL,
                "scm_branch": "",
                "scm_update_on_launch": True,
                "scm_delete_on_update": False,
                "scm_clean": False,
                "allow_override": False,
                "timeout": 0,
            },
            matcher=lambda item: item.get("name") == PROJECT_NAME and item.get("organization") == org["id"],
        )

        inventory = upsert(
            "inventories/",
            INVENTORY_NAME,
            {
                "name": INVENTORY_NAME,
                "description": "NetBox-backed homelab inventory.",
                "organization": org["id"],
                "kind": "",
            },
            matcher=lambda item: item.get("name") == INVENTORY_NAME and item.get("organization") == org["id"],
        )

        inventory_source = upsert(
            "inventory_sources/",
            INVENTORY_SOURCE_NAME,
            {
                "name": INVENTORY_SOURCE_NAME,
                "inventory": inventory["id"],
                "source": "scm",
                "source_project": project["id"],
                "source_path": "netbox_inventory.yaml",
                "credential": netbox_credential["id"],
                "overwrite": True,
                "overwrite_vars": True,
                "update_on_project_update": True,
                "update_cache_timeout": 0,
            },
            matcher=lambda item: item.get("name") == INVENTORY_SOURCE_NAME and item.get("inventory") == inventory["id"],
        )

        job_template = upsert(
            "job_templates/",
            JOB_TEMPLATE_NAME,
            {
                "name": JOB_TEMPLATE_NAME,
                "description": "Bootstrap-created template matching the local provision command.",
                "inventory": inventory["id"],
                "project": project["id"],
                "playbook": "provision/all.yaml",
                "job_type": "run",
                "limit": LIMIT,
                "ask_limit_on_launch": True,
                "ask_inventory_on_launch": False,
                "ask_credential_on_launch": True,
            },
            matcher=lambda item: item.get("name") == JOB_TEMPLATE_NAME and item.get("project") == project["id"],
        )

        ensure_association(f"job_templates/{job_template['id']}/credentials/", vault_credential["id"])
        ensure_association(f"job_templates/{job_template['id']}/credentials/", netbox_credential["id"])

        log(f"Inventory source ready: {inventory_source['name']}")
        log(f"Job template ready: {job_template['name']}")
        log("AWX bootstrap complete")


    if __name__ == "__main__":
        try:
            main()
        except Exception as exc:
            log(f"Bootstrap failed: {exc}")
            sys.exit(1)
---
apiVersion: batch/v1
kind: Job
metadata:
  name: awx-bootstrap
  namespace: awx
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  backoffLimit: 6
  template:
    spec:
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: python:3.12-alpine
          command: ["python", "/opt/bootstrap/bootstrap.py"]
          env:
            - name: AWX_API_URL
              value: http://awx-service/api/v2
            - name: AWX_ADMIN_USER
              value: admin
            - name: AWX_ORGANIZATION_NAME
              value: Whitestar Systems
            - name: AWX_PROJECT_NAME
              value: tpaulus/ansible
            - name: AWX_PROJECT_URL
              value: https://github.com/tpaulus/ansible.git
            - name: AWX_INVENTORY_NAME
              value: NetBox
            - name: AWX_INVENTORY_SOURCE_NAME
              value: NetBox inventory
            - name: AWX_JOB_TEMPLATE_NAME
              value: Provision all
            - name: AWX_LIMIT
              value: WoodlandPark
            - name: AWX_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: awx-secrets
                  key: password
            - name: AWX_VAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: awx-secrets
                  key: vault_password
            - name: AWX_NETBOX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: awx-secrets
                  key: netbox_token
          volumeMounts:
            - name: bootstrap
              mountPath: /opt/bootstrap
              readOnly: true
      volumes:
        - name: bootstrap
          configMap:
            name: awx-bootstrap
            items:
              - key: bootstrap.py
                path: bootstrap.py

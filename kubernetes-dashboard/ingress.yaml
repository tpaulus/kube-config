---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dashboard-ingress
  namespace: kubernetes-dashboard
  annotations:
    gethomepage.dev/description: Kubernetes dashboard
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Infrastructure
    gethomepage.dev/icon: kubernetes-dashboard.png
    gethomepage.dev/name: Kubernetes Dashboard
    gethomepage.dev/pod-selector: k8s-app=kubernetes-dashboard
spec:
  rules:
    - host: dashboard.ing.k3s.brickyard.whitestar.systems
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kubernetes-dashboard
                port:
                  number: 9090
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dashboard-tailscale
  namespace: kubernetes-dashboard
spec:
  ingressClassName: tailscale
  tls:
    - hosts:
        - dashboard
  rules:
    - http:
        paths:
          - backend:
              service:
                name: kubernetes-dashboard
                port:
                  number: 9090
            path: /
            pathType: Prefix

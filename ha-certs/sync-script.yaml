---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ha-sync-script
data:
  sync.sh: |
    #!/bin/bash
    set -e

    # Install Dependencies
    apt-get update
    apt-get install -y \
      openssh-client

    # Define variables
    LOCAL_CERT_PATH="/var/run/ssl/tls.crt"
    LOCAL_KEY_PATH="/var/run/ssl/tls.key"
    REMOTE_CERT_PATH="/ssl/fullchain.pem"
    REMOTE_KEY_PATH="/ssl/privkey.pem"

    HA_NGINX_RESTART_CMD="ha addons restart core_nginx_proxy"

    # Temporary file to store checksum for change detection
    REMOTE_CHECKSUM_CMD="md5sum $REMOTE_CERT_PATH $REMOTE_KEY_PATH"

    # SSH key setup
    mkdir -p /root/.ssh
    echo "$SSH_PRIVATE_KEY" > /root/.ssh/id_rsa
    chmod 600 /root/.ssh/id_rsa
    ssh-keyscan $REMOTE_HOST >> ~/.ssh/known_hosts

    # Checksum calculation for change detection
    calculate_local_checksum() {
        md5sum $LOCAL_CERT_PATH $LOCAL_KEY_PATH | awk '{print $1}'
    }

    calculate_remote_checksum() {
        ssh -i /root/.ssh/id_rsa $REMOTE_USER@$REMOTE_HOST "$REMOTE_CHECKSUM_CMD" | awk '{print $1}'
    }

    # Upload files to the remote host
    upload_files() {
        scp -i /root/.ssh/id_rsa $LOCAL_CERT_PATH $REMOTE_USER@$REMOTE_HOST:$REMOTE_CERT_PATH
        scp -i /root/.ssh/id_rsa $LOCAL_KEY_PATH $REMOTE_USER@$REMOTE_HOST:$REMOTE_KEY_PATH
    }

    # Restart NGINX Add-on on the remote host
    restart_nginx() {
        ssh -i /root/.ssh/id_rsa $REMOTE_USER@$REMOTE_HOST "$HA_NGINX_RESTART_CMD"
    }

    # Main logic
    local_checksum=$(calculate_local_checksum)
    remote_checksum=$(calculate_remote_checksum)

    # Compare checksums to detect changes
    if [[ "$local_checksum" != "$remote_checksum" ]]; then
        echo "Files have changed, uploading and restarting NGINX Add-on..."
        upload_files
        restart_nginx

        echo "All Done!"
    else
        echo "No changes detected, nothing to do."
    fi

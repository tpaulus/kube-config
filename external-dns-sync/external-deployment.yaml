---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: external-dns
  template:
    metadata:
      labels:
        app: external-dns
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "7979"
    spec:
      serviceAccountName: dns-sync
      containers:
        - name: external-dns
          image: registry.k8s.io/external-dns/external-dns:v0.21.0
          args:
            - --annotation-prefix=external-dns.kubernetes.io/
            - --source=service
            - --source=ingress
            - --domain-filter=it.paulus.family
            - --zone-id-filter=c4c79e93d4d2afd6c0abd49d6f26edad
            - --provider=cloudflare
            - --metrics-address=:7979
            - --cloudflare-dns-records-per-page=5000 # (optional) configure how many DNS records to fetch per request
            - --cloudflare-record-comment=Managed by K3s External DNS Sync # (optional) configure comments for provisioned records; <=100 chars for free zones; <=500 chars for paid zones
          ports:
            - containerPort: 7979
              name: metrics
          env:
            - name: CF_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-api-token
                  key: bearer
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 128Mi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: external-dns
  template:
    metadata:
      labels:
        app: external-dns
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "7979"
    spec:
      serviceAccountName: dns-sync
      containers:
        - name: external-dns
          # Includes kubernetes-sigs/external-dns#6383, which lets DNSEndpoint
          # SRV targets use the RFC-required trailing dot.
          image: gcr.io/k8s-staging-external-dns/external-dns:v20260509-v0.21.0-46-ge74f8d9f@sha256:1de3bfe4bd4296774d6b9e7998ece505cd38695a378b1b19b1d5fadc42104d42
          args:
            - --annotation-prefix=external-dns.kubernetes.io/
            - --events
            - --source=service
            - --source=ingress
            - --source=traefik-proxy
            - --source=crd
            - --provider=cloudflare
            - --managed-record-types=A
            - --managed-record-types=AAAA
            - --managed-record-types=CNAME
            - --managed-record-types=MX
            - --managed-record-types=TXT
            - --managed-record-types=SRV
            - --metrics-address=:7979
            - --cloudflare-dns-records-per-page=5000 # (optional) configure how many DNS records to fetch per request
            - --cloudflare-record-comment=Managed by K3s External DNS Sync # (optional) configure comments for provisioned records; <=100 chars for free zones; <=500 chars for paid zones
          ports:
            - containerPort: 7979
              name: metrics
          env:
            - name: CF_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-api-token
                  key: bearer
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 128Mi

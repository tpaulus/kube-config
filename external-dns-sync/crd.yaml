---
# DNSEndpoint CRD used by ExternalDNS CRD source (--source=crd).
# Resources of this type are created in the external-records namespace and
# synced to Cloudflare by the external ExternalDNS instance.
# Source: https://github.com/kubernetes-sigs/external-dns/blob/master/docs/contributing/crd-source/crd-manifest.yaml
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: dnsendpoints.externaldns.k8s.io
spec:
  group: externaldns.k8s.io
  names:
    kind: DNSEndpoint
    listKind: DNSEndpointList
    plural: dnsendpoints
    singular: dnsendpoint
  scope: Namespaced
  versions:
    - name: v1alpha1
      schema:
        openAPIV3Schema:
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              properties:
                endpoints:
                  items:
                    properties:
                      dnsName:
                        type: string
                      labels:
                        additionalProperties:
                          type: string
                        type: object
                      providerSpecific:
                        items:
                          properties:
                            name:
                              type: string
                            value:
                              type: string
                          required:
                            - name
                            - value
                          type: object
                        type: array
                      recordTTL:
                        format: int64
                        type: integer
                      recordType:
                        type: string
                      setIdentifier:
                        type: string
                      targets:
                        items:
                          type: string
                        type: array
                    type: object
                  type: array
              type: object
            status:
              properties:
                observedGeneration:
                  format: int64
                  type: integer
              type: object
          type: object
      served: true
      storage: true
      subresources:
        status: {}

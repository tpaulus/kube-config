---
groups:
  - name: kei
    rules:
      - alert: Photos Backup Started
        expr: kube_cronjob_status_active{namespace="kei", cronjob="backup-kei-mel"} > 0
        for: 0s
        keep_firing_for: 5m
        labels:
          severity: info
          notify: email-mel
        annotations:
          summary: kei photo backup started for Mel's library
      - alert: Photo Backup Not Running
        expr: ((time() - kube_cronjob_status_last_successful_time{namespace="kei"}) / 60 / 60) >= 25
        for: 0s
        labels:
          severity: high
        annotations:
          summary: kei photo backups not running for {{ $labels.cronjob }}
          description: "{{ $labels.cronjob }} has not run in the last 24 hours, when it should be running every 12 hours."

---
groups:
  - name: Kubernetes
    rules:
      - alert: Container OOMKilled
        expr: |
          (
            increase(kube_pod_container_status_restarts_total[10m]) > 0
          )
            and on (namespace, pod, container)
          (
            kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
          )
        labels:
          severity: warning
        annotations:
          summary: Container {{ $labels.namespace }}/{{ $labels.pod }} was OOMKilled
          description: Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} restarted after being terminated by the OOM killer within the last 10 minutes.
      - alert: Container CrashLoopBackOff
        expr: |
          max by (namespace, pod, container) (
            kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"} == 1
          )
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Container {{ $labels.namespace }}/{{ $labels.pod }} is crash looping
          description: Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been in CrashLoopBackOff for more than 10 minutes.
      - alert: Container ImagePullBackOff
        expr: |
          max by (namespace, pod, container, reason) (
            kube_pod_container_status_waiting_reason{reason=~"ImagePullBackOff|ErrImagePull"} == 1
          )
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Container {{ $labels.namespace }}/{{ $labels.pod }} cannot pull its image
          description: Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been stuck in {{ $labels.reason }} for more than 10 minutes.
      - alert: Pod Pending
        expr: |
          sum by (namespace, pod) (
            kube_pod_status_phase{phase="Pending"} == 1
          ) > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Pod {{ $labels.namespace }}/{{ $labels.pod }} is stuck pending
          description: Pod {{ $labels.namespace }}/{{ $labels.pod }} has been pending for more than 15 minutes.
      - alert: Deployment Replicas Unavailable
        expr: |
          kube_deployment_status_replicas_unavailable > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has unavailable replicas
          description: Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has {{ $value }} unavailable replicas for more than 10 minutes.
      - alert: Node NotReady
        expr: |
          kube_node_status_condition{condition="Ready", status="true"} == 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: Node {{ $labels.node }} is not ready
          description: Kubernetes node {{ $labels.node }} has been NotReady for more than 10 minutes.

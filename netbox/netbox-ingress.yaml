apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: netbox-whitestar-systems
  namespace: netbox
spec:
  secretName: netbox-whitestar-systems-cert
  duration: 2160h0m0s
  dnsNames:
    - netbox.whitestar.systems
  issuerRef:
    name: letsencrypt-cf-prod
    kind: ClusterIssuer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: netbox
  namespace: netbox
spec:
  rules:
    - host: netbox.ing.k3s.brickyard.whitestar.systems
      http:
        paths:
          - backend:
              service:
                name: netbox
                port:
                  number: 80
            path: /
            pathType: Prefix
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: jwt-verification
  namespace: netbox
spec:
  plugin:
    jwt:
      issuers: ["https://whitestar.cloudflareaccess.com/cdn-cgi/access/certs"]
      headerName: Cf-Access-Jwt-Assertion
      require:
        aud: 268fe8ea853dbd153ec9023eb2187d88b33c0a45be66dea14a9113a26292c0cb
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: inject-headers
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: https
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: netbox-ext
  namespace: netbox
  annotations:
    external-dns.kubernetes.io/target: lfp.it.paulus.family
    traefik.ingress.kubernetes.io/router.middlewares: netbox-inject-headers@kubernetescrd
spec:
  tls:
    - hosts:
        - netbox.whitestar.systems
      secretName: netbox-whitestar-systems-cert
  rules:
    - host: netbox.whitestar.systems
      http:
        paths:
          - backend:
              service:
                name: netbox
                port:
                  number: 80
            path: /
            pathType: Prefix

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-deployment
  namespace: monitoring
  labels:
    app: prometheus-server
spec:
  replicas: 2
  revisionHistoryLimit: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: prometheus-server
  template:
    metadata:
      labels:
        app: prometheus-server
    spec:
      initContainers:
        - name: volume-permissions
          image: busybox:1.37
          command: [sh, -c, chown nobody:nobody /data]
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: prometheus-storage-volume
              mountPath: /data
      containers:
        - name: prometheus
          image: prom/prometheus:v3.11.3
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus/
            - --storage.tsdb.retention.size=50GB
            - --enable-feature=auto-gomaxprocs,new-service-discovery-manager,memory-snapshot-on-shutdown
            - --web.external-url=https://prometheus.ing.k3s.brickyard.whitestar.systems
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config-volume
              mountPath: /etc/prometheus/
            - name: prometheus-storage-volume
              mountPath: /prometheus/
            - name: kube-config-rules-volume
              mountPath: /run/rules/kube-config
            - name: arr-stack-rules-volume
              mountPath: /run/rules/arr-stack
            - name: netbox-token
              mountPath: /run/secrets/netbox-token
          resources:
            requests:
              memory: 6144Mi
              cpu: 5000m
            limits:
              memory: 6144Mi
              cpu: 5000m
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
          readinessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 65534
            runAsGroup: 65534
        - name: kube-config-rules-git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.6.0
          args:
            - --repo=https://github.com/tpaulus/kube-config.git
            - --root=/run/prometheus-rules
            - --link=kube-config
            - --period=1m
            - --webhook-url=http://127.0.0.1:9090/-/reload
            - --webhook-method=POST
            - --http-metrics
            - --http-bind=:1234
          ports:
            - containerPort: 1234
              name: metrics
          volumeMounts:
            - name: kube-config-rules-volume
              mountPath: /run/prometheus-rules
          resources:
            requests:
              memory: 256Mi
              cpu: 50m
            limits:
              memory: 512Mi
              cpu: 100m
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
        - name: arr-stack-rules-git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.6.0
          args:
            - --repo=git@github.com:tpaulus/arr-stack.git
            - --ssh-key-file=/run/ssh-key/private
            - --ssh-known-hosts=true
            - --ssh-known-hosts-file=/run/ssh-known-hosts/known_hosts
            - --root=/run/prometheus-rules
            - --link=arr-stack
            - --period=1m
            - --webhook-url=http://127.0.0.1:9090/-/reload
            - --webhook-method=POST
            - --http-metrics
            - --http-bind=:1235
          ports:
            - containerPort: 1235
              name: metrics
          volumeMounts:
            - name: arr-stack-rules-volume
              mountPath: /run/prometheus-rules
            - name: ssh-key
              mountPath: /run/ssh-key
            - name: ssh-known-hosts
              mountPath: /run/ssh-known-hosts
          resources:
            requests:
              memory: 256Mi
              cpu: 50m
            limits:
              memory: 512Mi
              cpu: 100m
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
            runAsUser: 0
      volumes:
        - name: prometheus-config-volume
          configMap:
            defaultMode: 420
            name: prometheus-server-conf
        - name: prometheus-storage-volume
          emptyDir: 
            sizeLimit: 55Gi
        - name: kube-config-rules-volume
          emptyDir: {}
        - name: arr-stack-rules-volume
          emptyDir: {}          
        - name: netbox-token
          secret:
            secretName: netbox-token
            items:
              - key: password
                path: netbox-token
            defaultMode: 0444
        - name: ssh-key
          secret:
            secretName: arr-stack-ssh-key
            items:
              - key: private-key
                path: private
            defaultMode: 0400
        - name: ssh-known-hosts
          configMap:
            name: arr-stack-ssh-known-hosts

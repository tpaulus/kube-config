---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: deployment-alert-restarter
  namespace: monitoring
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-alert-restarter
  namespace: monitoring
  labels:
    app: deployment-alert-restarter
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: deployment-alert-restarter
  template:
    metadata:
      labels:
        app: deployment-alert-restarter
    spec:
      serviceAccountName: deployment-alert-restarter
      automountServiceAccountToken: true
      containers:
        - name: deployment-alert-restarter
          image: python:3.14-alpine
          imagePullPolicy: IfNotPresent
          command: ["python", "/app/server.py"]
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: TARGET_ALERTS
              value: QbittorentNotConnected,QbittorrentNoDHTNodes
            - name: NAMESPACE_LABELS
              value: namespace
            - name: DEPLOYMENT_LABELS
              value: deployment
            - name: COOLDOWN_SECONDS
              value: "900"
          ports:
            - containerPort: 8080
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: app
          configMap:
            name: deployment-alert-restarter
            defaultMode: 0555
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: deployment-alert-restarter
  namespace: monitoring
spec:
  selector:
    app: deployment-alert-restarter
  ports:
    - name: http
      port: 8080
      targetPort: http

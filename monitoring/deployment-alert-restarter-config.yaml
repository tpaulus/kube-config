---
apiVersion: v1
kind: ConfigMap
metadata:
  name: deployment-alert-restarter
  namespace: monitoring
data:
  server.py: |
    import json
    import os
    import ssl
    import time
    import urllib.error
    import urllib.request
    from datetime import datetime, timezone
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer


    TARGET_ALERTS = {
        name.strip()
        for name in os.environ["TARGET_ALERTS"].split(",")
        if name.strip()
    }
    NAMESPACE_LABELS = tuple(
        name.strip()
        for name in os.environ.get("NAMESPACE_LABELS", "namespace").split(",")
        if name.strip()
    )
    DEPLOYMENT_LABELS = tuple(
        name.strip()
        for name in os.environ.get("DEPLOYMENT_LABELS", "deployment").split(",")
        if name.strip()
    )
    COOLDOWN_SECONDS = int(os.environ.get("COOLDOWN_SECONDS", "900"))
    LISTEN_PORT = int(os.environ.get("PORT", "8080"))
    API_SERVER = (
        f"https://{os.environ['KUBERNETES_SERVICE_HOST']}:"
        f"{os.environ.get('KUBERNETES_SERVICE_PORT_HTTPS', os.environ.get('KUBERNETES_SERVICE_PORT', '443'))}"
    )
    TOKEN_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    CA_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

    _last_restart = {}


    def log(message):
        print(message, flush=True)


    def get_first_label(labels, candidates):
        for key in candidates:
            value = labels.get(key)
            if value:
                return value
        return None


    def restart_deployment(namespace, deployment):
        timestamp = datetime.now(timezone.utc).isoformat()
        patch = json.dumps(
            {
                "spec": {
                    "template": {
                        "metadata": {
                            "annotations": {
                                "kubectl.kubernetes.io/restartedAt": timestamp
                            }
                        }
                    }
                }
            }
        ).encode()

        with open(TOKEN_PATH, encoding="utf-8") as token_file:
            token = token_file.read().strip()

        request = urllib.request.Request(
            url=(
                f"{API_SERVER}/apis/apps/v1/namespaces/{namespace}"
                f"/deployments/{deployment}"
            ),
            data=patch,
            method="PATCH",
            headers={
                "Authorization": f"Bearer {token}",
                "Content-Type": "application/strategic-merge-patch+json",
            },
        )

        ssl_context = ssl.create_default_context(cafile=CA_PATH)
        with urllib.request.urlopen(request, context=ssl_context, timeout=10) as response:
            response.read()

        return timestamp


    class Handler(BaseHTTPRequestHandler):
        def _write_json(self, status_code, payload):
            body = json.dumps(payload).encode()
            self.send_response(status_code)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def do_GET(self):
            if self.path == "/healthz":
                self._write_json(200, {"ok": True})
                return

            self._write_json(404, {"ok": False, "error": "not found"})

        def do_POST(self):
            global _last_restart

            content_length = int(self.headers.get("Content-Length", "0"))
            try:
                payload = json.loads(self.rfile.read(content_length) or b"{}")
            except json.JSONDecodeError:
                self._write_json(400, {"ok": False, "error": "invalid json"})
                return

            alerts = payload.get("alerts", [])
            matching_targets = {}
            missing_targets = []
            for alert in alerts:
                labels = alert.get("labels", {})
                alert_name = labels.get("alertname", "")
                if alert.get("status") != "firing" or alert_name not in TARGET_ALERTS:
                    continue

                namespace = get_first_label(labels, NAMESPACE_LABELS)
                deployment = get_first_label(labels, DEPLOYMENT_LABELS)
                if not namespace or not deployment:
                    missing_targets.append(alert_name)
                    continue

                matching_targets.setdefault((namespace, deployment), set()).add(alert_name)

            if not matching_targets:
                self._write_json(
                    200,
                    {
                        "ok": True,
                        "restarted": False,
                        "matchedAlerts": sorted(set(missing_targets)),
                        "reason": "no_target_labels" if missing_targets else "no_matching_alerts",
                    },
                )
                return

            now = time.time()
            restarted = []
            skipped = []
            for (namespace, deployment), alert_names in sorted(matching_targets.items()):
                key = f"{namespace}/{deployment}"
                if now - _last_restart.get(key, 0.0) < COOLDOWN_SECONDS:
                    skipped.append(
                        {
                            "namespace": namespace,
                            "deployment": deployment,
                            "matchedAlerts": sorted(alert_names),
                            "reason": "cooldown_active",
                        }
                    )
                    continue

                try:
                    restarted_at = restart_deployment(namespace, deployment)
                except urllib.error.HTTPError as error:
                    log(
                        f"restart failed for {namespace}/{deployment} "
                        f"with HTTP {error.code}: {error.read().decode('utf-8', 'replace')}"
                    )
                    self._write_json(
                        500,
                        {
                            "ok": False,
                            "error": "restart failed",
                            "namespace": namespace,
                            "deployment": deployment,
                            "matchedAlerts": sorted(alert_names),
                        },
                    )
                    return
                except urllib.error.URLError as error:
                    log(f"restart failed for {namespace}/{deployment}: {error}")
                    self._write_json(
                        500,
                        {
                            "ok": False,
                            "error": "restart failed",
                            "namespace": namespace,
                            "deployment": deployment,
                            "matchedAlerts": sorted(alert_names),
                        },
                    )
                    return

                _last_restart[key] = now
                log(
                    "restarted deployment "
                    f"{namespace}/{deployment} for alerts {', '.join(sorted(alert_names))}"
                )
                restarted.append(
                    {
                        "namespace": namespace,
                        "deployment": deployment,
                        "matchedAlerts": sorted(alert_names),
                        "restartedAt": restarted_at,
                    }
                )

            self._write_json(
                200 if restarted else 202,
                {
                    "ok": True,
                    "restarted": bool(restarted),
                    "targets": restarted,
                    "skipped": skipped,
                    "missingTargets": sorted(set(missing_targets)),
                },
            )

        def log_message(self, format, *args):
            log("%s - - [%s] %s" % (self.client_address[0], self.log_date_time_string(), format % args))


    if __name__ == "__main__":
        server = ThreadingHTTPServer(("0.0.0.0", LISTEN_PORT), Handler)
        log(f"listening on :{LISTEN_PORT}")
        server.serve_forever()

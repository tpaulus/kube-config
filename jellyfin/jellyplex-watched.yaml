---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyplex-watched
  namespace: jellyfin
  labels:
    app: jellyplex-watched
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: jellyplex-watched
  template:
    metadata:
      labels:
        app: jellyplex-watched
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      dnsConfig:
        options:
          - name: ndots
            value: '1'
      dnsPolicy: ClusterFirst
      containers:
        - name: jellyplex-watched
          image: luigi311/jellyplex-watched:latest
          imagePullPolicy: Always
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          env:
            - name: PUID
              value: '1000'
            - name: PGID
              value: '1000'
          envFrom:
            - configMapRef:
                name: jellyplex-watched-config
            - secretRef:
                name: jellyplex-watched-secrets
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: jellyplex-watched-config
  namespace: jellyfin
data:
  DRYRUN: 'False'
  DEBUG_LEVEL: DEBUG
  RUN_ONLY_ONCE: 'False'
  SLEEP_DURATION: '3600'
  LOG_FILE: /tmp/jellyplex-watched.log
  MARK_FILE: /tmp/jellyplex-watched-mark.log
  REQUEST_TIMEOUT: '300'
  MAX_THREADS: '1'
  GENERATE_GUIDS: 'True'
  GENERATE_LOCATIONS: 'True'
  SSL_BYPASS: 'False'
  SYNC_FROM_PLEX_TO_JELLYFIN: 'True'
  SYNC_FROM_JELLYFIN_TO_PLEX: 'True'
  SYNC_FROM_PLEX_TO_PLEX: 'False'
  SYNC_FROM_PLEX_TO_EMBY: 'False'
  SYNC_FROM_JELLYFIN_TO_JELLYFIN: 'False'
  SYNC_FROM_JELLYFIN_TO_EMBY: 'False'
  SYNC_FROM_EMBY_TO_PLEX: 'False'
  SYNC_FROM_EMBY_TO_JELLYFIN: 'False'
  SYNC_FROM_EMBY_TO_EMBY: 'False'
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: jellyplex-watched-secrets
  namespace: jellyfin
spec:
  itemPath: vaults/K3S/items/JellyPlex-Watched

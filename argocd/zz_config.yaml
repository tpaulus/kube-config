---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
  name: argocd-cm
  namespace: argocd
data:
  url: https://argocd.ing.k3s.brickyard.whitestar.systems
  additionalUrls: |
    - https://argocd.auth-ing.k3s.brickyard.whitestar.systems
  resource.customizations: |
    extensions/Ingress:
      health.lua: |
        hs = {}
        hs.status = "Healthy"
        return hs
  oidc.config: |
    name: Simple IDP
    issuer: https://sso.paulus.family
    clientID: argocd
    clientSecret: $simple-idp-secrets:ARGOCD_OIDC_CLIENT_SECRET
    requestedScopes:
      - openid
      - profile
      - email
      - groups
    logoutURL: https://sso.paulus.family/logout
  admin.enabled: "false"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  labels:
    app.kubernetes.io/part-of: argocd
  name: simple-idp-secrets
  namespace: argocd
spec:
  itemPath: vaults/K3S/items/simple-idp
---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: argocd-cmd-params-cm
    app.kubernetes.io/part-of: argocd
  name: argocd-cmd-params-cm
  namespace: argocd
data:
  server.insecure: "true"
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: argocd-secret
  namespace: argocd
spec:
  itemPath: vaults/K3S/items/argocd
---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: argocd-rbac-cm
    app.kubernetes.io/part-of: argocd
  name: argocd-rbac-cm
data:
  scopes: "[groups]"
  policy.csv: |
    g, family, role:admin
    g, argocd_administrators, role:admin
    g, argocd_users, role:readonly
  policy.default: ""

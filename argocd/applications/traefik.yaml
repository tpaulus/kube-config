---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  destination:
    namespace: traefik
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: traefik
    helm:
      parameters:
        - name: deployment.replicas
          value: "2"
      values: |
        ports:
          web:
            http:
              redirections:
                entryPoint:
                  to: websecure
                  scheme: https
                  permanent: true
          websecure:
            asDefault: true
          web-mtls:
            asDefault: true
            port: 9443
            exposedPort: 9443
            expose:
              default: true
            protocol: TCP
            http:
              tls:
                enabled: true
                options: traefik-require-client-cert@kubernetescrd
          web-ext:
            port: 9200
            exposedPort: 9200
            protocol: TCP
            http:
              middlewares:
                - traefik-rewrite-cf-tunnel-headers@kubernetescrd
        accessLog:
          enabled: true
          format: json
          filters:
            statusCodes: 400-599
          fields:
            headers:
              defaultMode: drop
              names:
                CF-Connecting-IP: keep
                CF-Ray: keep
                User-Agent: keep
                X-Forwarded-For: keep
                X-Forwarded-Proto: keep
        experimental:
          plugins:
            jwt:
              moduleName: github.com/tpaulus/jwt-middleware
              version: v1.1.14
            cloudflarewarp:
              moduleName: github.com/BetterCorp/cloudflarewarp
              version: v1.3.3
        providers:
          kubernetesIngress:
            allowExternalNameServices: true
            publishedService:
              enabled: true
        service:
          spec:
            externalTrafficPolicy: Local
    repoURL: https://traefik.github.io/charts
    targetRevision: 41.0.2
  syncPolicy:
    automated:
      prune: true
    syncOptions: [CreateNamespace=true]

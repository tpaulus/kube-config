---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: simple-idp
  namespace: argocd
spec:
  destination:
    namespace: simple-idp
    server: https://kubernetes.default.svc
  project: default
  source:
    path: simple-idp
    repoURL: git@github.com:tpaulus/kube-config.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
    syncOptions: [CreateNamespace=true]

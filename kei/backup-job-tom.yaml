---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-kei-tom
  namespace: kei
spec:
  schedule: "0 2,14 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      completions: 1
      parallelism: 1
      backoffLimit: 1
      template:
        spec:
          automountServiceAccountToken: false
          securityContext:
            fsGroup: 65534
            fsGroupChangePolicy: OnRootMismatch
          restartPolicy: Never
          initContainers:
            - name: prepare-data-dir
              image: busybox:1.38
              command:
                - sh
                - -ec
                - |
                  mkdir -p /config
                  cp -af /session-seed/. /config/
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 65534
                runAsGroup: 65534
              volumeMounts:
                - name: data
                  mountPath: /config
                - name: session-seed
                  mountPath: /session-seed
          containers:
            - name: backup-photos
              image: ghcr.io/rhoopr/kei:0.22.11
              command:
                - sh
                - -ec
              args:
                - |
                  if [ ! -f /config/state.db ]; then
                    kei import-existing \
                      --config /config/config.toml \
                      --password-file /credentials/ICLOUD_PASSWORD
                  fi

                  exec kei sync \
                    --config /config/config.toml \
                    --password-file /credentials/ICLOUD_PASSWORD
              env:
                - name: ICLOUD_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: tom-icloud
                      key: ICLOUD_USERNAME
              volumeMounts:
                - name: storage
                  mountPath: /photos
                - name: data
                  mountPath: /config
                - name: kei-config
                  mountPath: /config/config.toml
                  subPath: config.toml
                  readOnly: true
                - name: credentials
                  mountPath: /credentials
                  readOnly: true
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                runAsNonRoot: false
          volumes:
            - name: storage
              nfs:
                server: woodlandpark.brickyard.whitestar.systems
                path: /mnt/tank/icloud/tom
                readOnly: false
            - name: data
              persistentVolumeClaim:
                claimName: kei-data-tom
            - name: kei-config
              configMap:
                name: kei-config
            - name: credentials
              secret:
                secretName: tom-icloud
            - name: session-seed
              secret:
                secretName: tom-icloud-cookie
          dnsConfig:
            nameservers: [1.1.1.1, 1.0.0.1]
          dnsPolicy: None
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: tom-icloud
  namespace: kei
spec:
  itemPath: vaults/K3S/items/icloud-tom-login
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: tom-icloud-cookie
  namespace: kei
spec:
  itemPath: vaults/K3S/items/icloud-tom-cookie
